om/Azure/bicep/releases/download/v0.40.2/vscode-bicep.vsix"}],"tarball_url":"https://api.github.com/repos/Azure/bicep/tarball/v0.40.2","zipball_url":"https://api.github.com/repos/Azure/bicep/zipball/v0.40.2","body":"##
        Highlights\r\n\r\n* Multi-line interpolated strings GA! (#18666)\r\n\r\n    Basic
        example:\r\n    ```bicep\r\n    var s = $''''''\r\n    this is ${interpolated}''''''\r\n    ```\r\n\r\n    With
        multiple `$` characters:\r\n    ```bicep\r\n    var s = $$''''''\r\n    this
        is $${interpolated}\r\n    this is not ${interpolated}''''''\r\n    ```\r\n\r\n*
        [Experimental] New `this.exists()` and `this.existingResource()` functions
        for resource existence checks (#17727)\r\n\r\n    Example usage:\r\n    ```bicep\r\n    resource
        storageAccount ''Microsoft.Storage/storageAccounts@2021-09-01'' = {\r\n      name:
        ''mystorageaccount''\r\n      location: ''eastus''\r\n      sku: {\r\n        name:
        ''Standard_LRS''\r\n      }\r\n      kind: ''StorageV2''\r\n      properties:
        {\r\n        minimumTlsVersion: ''TLS1_2''\r\n        publicNetworkAccess:
        this.exists() ? ''Enabled'' : ''Disabled''\r\n      }\r\n    }\r\n    ```\r\n\r\n*
        New MCP Server tools (#18707, #18826)\r\n    * `decompile_arm_parameters_file`:
        Converts ARM template parameter JSON files into Bicep parameters format (.bicepparam).\r\n    *
        `decompile_arm_template_file`: Converts ARM template JSON files into Bicep
        syntax (.bicep).\r\n    * `format_bicep_file`: Applies consistent formatting
        (indentation, spacing, line breaks) to Bicep files.\r\n    * `get_bicep_file_diagnostics`:
        Analyzes a Bicep file and returns all compilation diagnostics.\r\n    * `get_file_references`:
        Analyzes a Bicep file and returns a list of all referenced files including
        modules, parameter files, and other dependencies.\r\n    * `get_deployment_snapshot`:
        Creates a deployment snapshot from a .bicepparam file by compiling and pre-expanding
        the ARM template, allowing you to preview predicted resources and perform
        semantic diffs between Bicep implementations.\r\n\r\n* Publish Bicep MCP server
        as a nuget package (#18709)\r\n\r\n    Example `mcp.json` configuration:\r\n    ```json\r\n    {\r\n      \"servers\":
        {\r\n        \"Bicep\": {\r\n          \"type\": \"stdio\",\r\n          \"command\":
        \"dnx\",\r\n          \"args\": [ \"Azure.Bicep.McpServer\", \"--yes\" ]\r\n        }\r\n      }\r\n    }\r\n    ```\r\n\r\n*
        `bicep console`: Support piping and stdin/out redirection (#18762)\r\n\r\n    Example
        with piping:\r\n    ```sh\r\n    echo \"parseCidr(''10.144.0.0/20'')\" | bicep
        console\r\n    ```\r\n\r\n    Example with input redirection:\r\n    ```sh\r\n    echo
        \"parseCidr(''10.144.0.0/20'')\" > test.txt\r\n    bicep console < test.txt\r\n    ```\r\n\r\n    Example
        with output redirection:\r\n    ```sh\r\n    echo \"parseCidr(''10.144.0.0/20'')\"
        | bicep console > output.json\r\n    ```\r\n\r\n* Extendable Parameter Files
        Improvements:\r\n  * Enable parameter files to evaluate variables from extended
        base parameters (#18626)\r\n  * Add support for `loadTextContent` function
        in extendable parameter files (#18424)\r\n\r\n* Multiline diagnostic pragmas
        (#18622)\r\n\r\n    Disable a specific diagnostic for a whole file:\r\n    ```bicep\r\n    #disable-diagnostics
        BCP422\r\n\r\n    ...\r\n\r\n    resource foo ''type@version'' = if (condition)
        {}\r\n\r\n    output bar string = foo.properties.bar // <-- would normally
        raise BCP422 as a warning, but will not due to pragma at top of file\r\n    ```\r\n\r\n\r\n    Disable
        specific diagnostics for a span:\r\n    ```bicep\r\n    resource foo ''type@version''
        = if (condition) {}\r\n\r\n    #disable-diagnostics BCP422\r\n    output bar
        string = foo.properties.bar // <-- would normally raise BCP422 as a warning,
        but will not due to pragma at top of file\r\n    #restore-diagnostics BCP422\r\n\r\n    output
        baz string = foo.properties.baz // <-- will raise BCP422 warning because it''s
        outside of the pragma fence\r\n    ```\r\n\r\n* Migrate to .NET 10 (#18458)\r\n\r\n##
        Bug Fixes and Features\r\n\r\n* Use integer and boolean literal types when
        deriving return type for `loadJsonContent` (#18466)\r\n* Update `deployment()`
        return type signature to add conditional `metadata` property (#18468)\r\n*
        Recognize `<collection module>[<index>]!` as a direct module reference for
        secure outputs check (#18522)\r\n* Extension config default values constraint
        fixes (#18606)\r\n* Update lv 2.0 triggers to take syntactically nested resources
        into account (#18607)\r\n* Making the scope property a fully qualified resource
        Id (#18165)\r\n* Expand support for types in local extension (#18662)\r\n*
        Improved extension configuration experience (#18828)\r\n* Fix handling registry
        module resource derived types in params file (#18661)\r\n* Fix completion
        to correctly suggest imported types in bicepparam files (#18523)\r\n* Fix
        quoted property names and enhance symbol resolution (#18509)\r\n* Fix nested
        function calls losing bindings when using extendable parameters (#18876)\r\n*
        Always use named pipes on Windows for gRPC (#18712)\r\n* Remove DSC experimental
        feature (#18821)\r\n* Simplify YAML/JSON parser code path with Result pattern
        (#18713)\r\n* Refactor external inputs processing logic to use `InlineDependencyVisitor`
        and dedicated `FunctionFlag` (#18740)\r\n* Update CSAT survey to be always
        on instead of annual (#18657)\r\n\r\n## Documentation\r\n\r\n* Add troubleshooting
        steps for MCP tools not showing (#18563)\r\n* Revise Bicep MCP Server Docs
        (#18699)\r\n* Revise local deploy debugging guide for Bicep extensions (#18701)\r\n*
        Add unit testing guide for Bicep extensions (#18702)\r\n* Add beginner tip
        to Bicep getting started section (#18706)\r\n* Improve documentation for extendable
        parameter files (#18656)\r\n* Add bicep local-deploy arguments table docs
        (#18788)\r\n\r\n## Community Contributions\r\n\r\n* E2E Tests for playground
        with playwright (#18521) - thanks @ShpendKe !\r\n* Add: bicep local-deploy
        arguments table docs (#18788) - thanks @johnlokerse !\r\n* Add beginner tip
        to Bicep getting started section (#18706) - @JennyCloud !\r\n* Fix grammar
        in codebase documentation (#18768) - thanks @JennyCloud !","reactions":{"url":"https://api.github.com/repos/Azure/bicep/releases/279518935/reactions","total_count":13,"+1":0,"-1":0,"laugh":0,"hooray":13,"confused":0,"heart":0,"rocket":0,"eyes":0},"mentions_count":3}'
